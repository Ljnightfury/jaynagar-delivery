<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jaynagar Delivery</title>
<style>
body { font-family: sans-serif; text-align: center; padding: 20px; }
#loader { color: #fc8019; font-weight: bold; }
</style>
</head>
<body>
    <div id="loader">Loading Menu...</div>
    <div id="content" style="display:none;">
        <h1>Jaynagar Delivery</h1>
        <p>System Connected Successfully.</p>
    </div>
<script>
const URL = 'https://script.google.com/macros/s/AKfycbxLpEKD2Sw_G-k9Oi6tiArMcfzeC7gdAXtpvESrzEpv6e7QPi5lJ9vXkKFY4KKzFLL/exec';
window.onload = () => {
    fetch(URL + "?action=getMenu&t=" + Date.now())
    .then(r => r.json())
    .then(d => {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        console.log("Menu loaded:", d);
    })
    .catch(e => {
        document.getElementById('loader').innerText = "Network Error. Check Google Sheet 'Menu' tab.";
    });
};
</script>
</body>
</html>
