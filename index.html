<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaynagar Delivery Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 pb-20">

    <!-- Header -->
    <header class="bg-orange-500 text-white p-4 shadow-lg sticky top-0 z-10">
        <h1 class="text-xl font-bold">Jaynagar Delivery</h1>
    </header>

    <!-- Menu Section -->
    <main id="menu" class="p-4 space-y-4">
        <p class="text-gray-500 text-center">Loading premium menu...</p>
    </main>

    <!-- Bottom Nav Bar -->
    <nav class="fixed bottom-0 w-full bg-white border-t p-3 flex justify-around text-orange-500 font-bold shadow-2xl">
        <button onclick="document.getElementById('menu').scrollIntoView()">Home</button>
        <button onclick="showTrack()">Track</button>
        <button onclick="showSupport()">Support</button>
    </nav>

    <script>
        const URL = 'YOUR_URL_HERE'; // PASTE YOUR SCRIPT URL HERE

        // Load Menu
        fetch(URL + "?action=getMenu").then(r=>r.json()).then(data => {
            let html = "<h2 class='text-lg font-bold text-gray-700'>Recommended for You</h2>";
            data.forEach(item => {
                html += `<div class='bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center'>
                            <div><p class='font-bold'>${item.name}</p><p class='text-sm text-gray-500'>${item.restaurant}</p></div>
                            <p class='font-bold text-orange-600'>₹${item.price}</p>
                         </div>`;
            });
            document.getElementById('menu').innerHTML = html;
        });

        function showTrack() {
            let phone = prompt("Enter your phone number to track order:");
            if (phone) {
                fetch(URL + "?action=trackOrder&phone=" + phone)
                .then(r => r.text())
                .then(data => alert(data));
            }
        }

        function showSupport() {
            const support = `Support Hub:
            1. Chat with Lucky: 8851463530
            2. Chat with Mona Jaiswal: 6206671465
            3. Email: dragonlj6@gmail.com
            4. Ask AI: gemini.google.com`;
            alert(support);
        }
    </script>
</body>
</html>
