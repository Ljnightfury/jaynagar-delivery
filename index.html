<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaynagar Delivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none !important; }
        .view-section { padding-bottom: 80px; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

    <!-- Header -->
    <header class="bg-orange-500 text-white p-4 shadow-md sticky top-0 z-20 flex justify-between items-center">
        <h1 class="text-xl font-bold" id="header-title">Jaynagar Delivery</h1>
        <button onclick="switchView('cart-view')" class="relative">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
            <span id="cart-count" class="absolute -top-2 -right-2 bg-white text-orange-500 text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center shadow">0</span>
        </button>
    </header>

    <div id="loading" class="text-center mt-10 text-orange-500 font-bold animate-pulse">Connecting to servers...</div>

    <!-- Home View -->
    <main id="home-view" class="view-section p-4 max-w-md mx-auto hidden">
        <h2 class="text-lg font-bold mb-4 text-gray-600">Explore Restaurants</h2>
        <div id="restaurant-list" class="space-y-4"></div>
    </main>

    <!-- Menu View -->
    <main id="menu-view" class="view-section p-4 max-w-md mx-auto hidden">
        <button onclick="switchView('home-view')" class="mb-4 text-sm text-orange-500 font-bold flex items-center">&larr; Back</button>
        <h2 id="current-restaurant-name" class="text-xl font-extrabold mb-4">Menu</h2>
        <div id="menu-list" class="space-y-4"></div>
    </main>

    <!-- Track View -->
    <main id="track-view" class="view-section p-4 max-w-md mx-auto hidden">
        <h2 class="text-xl font-extrabold mb-4">Track Order</h2>
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 space-y-4">
            <input type="tel" id="track-phone" placeholder="Enter phone number" class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-orange-500 outline-none">
            <button onclick="runTrackOrder()" class="w-full bg-orange-500 text-white font-bold py-3 rounded-lg shadow-md">Check Status</button>
            <p id="track-result" class="text-center font-bold text-gray-700 mt-4 whitespace-pre-line"></p>
        </div>
    </main>

    <!-- Cart View -->
    <main id="cart-view" class="view-section p-4 max-w-md mx-auto hidden">
        <h2 class="text-xl font-extrabold mb-4">Checkout</h2>
        <div id="cart-items" class="bg-white p-4 rounded-xl shadow-sm mb-4 border border-gray-100"></div>
        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 mb-4 space-y-2 text-sm">
            <h3 class="font-bold text-gray-700 border-b pb-2 mb-2">Bill Details</h3>
            <div class="flex justify-between"><span>Item Total</span><span id="bill-item-total">₹0</span></div>
            <div class="flex justify-between"><span>GST (5%)</span><span id="bill-gst">₹0</span></div>
            <div class="flex justify-between text-orange-600 font-bold cursor-pointer" onclick="calculateDelivery()">
                <span>Delivery Fee</span><span id="bill-delivery">Calc Loc &rarr;</span>
            </div>
            <div id="delivery-msg" class="text-xs text-gray-400 text-right">Free delivery on orders above ₹300!</div>
            <div class="flex justify-between font-extrabold text-lg border-t pt-2 mt-2"><span>To Pay</span><span id="bill-grand-total">₹0</span></div>
        </div>
        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 space-y-3">
            <input type="text" id="cust-name" placeholder="Full Name" class="w-full border p-2 rounded">
            <input type="tel" id="cust-phone" placeholder="Phone Number" class="w-full border p-2 rounded">
            <input type="text" id="cust-address" placeholder="Address" class="w-full border p-2 rounded">
            <select id="payment-method" class="w-full border p-2 rounded"><option value="UPI">Pay via UPI</option><option value="COD">Cash on Delivery</option></select>
            <button onclick="placeOrder()" id="btn-place-order" class="w-full bg-orange-500 text-white font-bold py-3 rounded-lg">Place Order</button>
        </div>
    </main>

    <!-- Support View -->
    <main id="support-view" class="view-section p-4 max-w-md mx-auto hidden">
        <h2 class="text-xl font-extrabold mb-4">Support</h2>
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 space-y-3">
            <a href="https://wa.me/918851463530" class="block w-full bg-green-500 text-white text-center font-bold py-3 rounded-lg shadow">Chat with Lucky</a>
            <a href="https://wa.me/916206671465" class="block w-full bg-green-500 text-white text-center font-bold py-3 rounded-lg shadow">Chat with Mona</a>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 w-full bg-white border-t p-2 grid grid-cols-4 gap-1 text-gray-500 font-bold shadow-2xl z-20">
        <button onclick="switchView('home-view')" class="flex flex-col items-center hover:text-orange-500 p-1"><span class="text-xs">Home</span></button>
        <button onclick="switchView('track-view')" class="flex flex-col items-center hover:text-orange-500 p-1"><span class="text-xs">Track</span></button>
        <button onclick="switchView('cart-view')" class="flex flex-col items-center hover:text-orange-500 p-1"><span class="text-xs">Cart</span></button>
        <button onclick="switchView('support-view')" class="flex flex-col items-center hover:text-orange-500 p-1"><span class="text-xs">Support</span></button>
    </nav>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbztCCG3Rw_WY2WO_nt2FgjtaY85UImlE1YZd8moBRh0d4DQA546snx2_x-Hn5E7TR5gVg/exec';
        const BASE_LAT = 26.5816;
        const BASE_LON = 86.1297;

        let db = { restaurants: [], menu: [] };
        let cart = {};
        let finalTotals = { itemTotal: 0, gst: 0, delivery: null, grandTotal: 0, distance: null };

        fetch(SCRIPT_URL + "?action=getData").then(res => res.json()).then(data => {
            db = data; document.getElementById('loading').classList.add('hidden'); renderRestaurants(); switchView('home-view');
        });

        function switchView(viewId) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.add('hidden'));
            document.getElementById(viewId).classList.remove('hidden');
            if(viewId === 'cart-view') updateCartView();
            window.scrollTo(0,0);
        }

        // --- TRACKING LOGIC ---
        function runTrackOrder() {
            let phone = document.getElementById('track-phone').value;
            let res = document.getElementById('track-result');
            if(!phone) return alert("Enter phone number");
            res.innerText = "Finding...";
            fetch(SCRIPT_URL + "?action=trackOrder&phone=" + phone)
            .then(r => r.text())
            .then(t => res.innerText = t);
        }

        // --- RENDER & CART LOGIC (SAME AS BEFORE) ---
        function renderRestaurants() {
            let html = "";
            db.restaurants.forEach(r => {
                html += `<div onclick="openMenu('${r.id}', '${r.name}')" class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex items-center gap-4 cursor-pointer">
                    <div class="w-16 h-16 bg-gray-200 rounded-lg overflow-hidden flex-shrink-0">
                        <img src="${r.image}" class="w-full h-full object-cover">
                    </div>
                    <div><h3 class="font-extrabold text-lg">${r.name}</h3><p class="text-xs text-green-500 font-bold">Open Now</p></div>
                </div>`;
            });
            document.getElementById('restaurant-list').innerHTML = html;
        }

        function openMenu(restId, restName) {
            document.getElementById('current-restaurant-name').innerText = restName;
            let items = db.menu.filter(m => m.restaurant_id === restId);
            let html = "";
            items.forEach(item => {
                html += `<div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex justify-between items-center">
                    <div><h4 class="font-bold text-gray-800">${item.name}</h4><p class="font-extrabold text-sm text-gray-600">₹${item.price_inr}</p></div>
                    <button onclick="addToCart('${item.id}', '${item.name}', ${item.price_inr})" class="bg-orange-50 text-orange-600 border border-orange-200 text-sm font-bold px-4 py-2 rounded-lg">ADD</button>
                </div>`;
            });
            document.getElementById('menu-list').innerHTML = html;
            switchView('menu-view');
        }

        function addToCart(id, name, price) {
            if(cart[id]) { cart[id].qty++; } else { cart[id] = { name: name, price: price, qty: 1 }; }
            updateCartCount(); alert(name + " added!");
        }

        function updateCartCount() {
            let total = 0;
            for(let key in cart) total += cart[key].qty;
            document.getElementById('cart-count').innerText = total;
        }

        function updateCartView() {
            let html = ""; finalTotals.itemTotal = 0;
            for(let key in cart) {
                let c = cart[key]; finalTotals.itemTotal += (c.price * c.qty);
                html += `<div class="flex justify-between mb-2 pb-2 border-b text-sm"><span>${c.name} x ${c.qty}</span><span class="font-bold">₹${c.price * c.qty}</span></div>`;
            }
            document.getElementById('cart-items').innerHTML = html || "Cart is empty.";
            finalTotals.gst = Math.round(finalTotals.itemTotal * 0.05);
            document.getElementById('bill-item-total').innerText = "₹" + finalTotals.itemTotal;
            document.getElementById('bill-gst').innerText = "₹" + finalTotals.gst;
            updateGrandTotal();
        }

        function updateGrandTotal() {
            if(finalTotals.delivery === null) { document.getElementById('bill-grand-total').innerText = "Pending Loc"; return; }
            finalTotals.grandTotal = finalTotals.itemTotal + finalTotals.gst + finalTotals.delivery;
            document.getElementById('bill-grand-total').innerText = "₹" + finalTotals.grandTotal;
        }

        function calculateDelivery() {
            navigator.geolocation.getCurrentPosition(pos => {
                let d = Math.sqrt(Math.pow(pos.coords.latitude - BASE_LAT, 2) + Math.pow(pos.coords.longitude - BASE_LON, 2)) * 111;
                finalTotals.distance = d.toFixed(2);
                let fee = 0;
                if(finalTotals.itemTotal < 300) {
                    if(d <= 1) fee = 0; else if(d <= 3) fee = 20; else if(d <= 6) fee = 50; else if(d <= 10) fee = 70; else { alert("Out of zone"); return; }
                }
                finalTotals.delivery = fee;
                document.getElementById('bill-delivery').innerText = "₹" + fee;
                updateGrandTotal();
            });
        }

        function placeOrder() {
            let orderData = { customer_name: document.getElementById('cust-name').value, phone: document.getElementById('cust-phone').value, delivery_address: document.getElementById('cust-address').value, distance_km: finalTotals.distance, cart_details: cart, item_total: finalTotals.itemTotal, gst_amount: finalTotals.gst, delivery_fee: finalTotals.delivery, grand_total: finalTotals.grandTotal, payment_method: document.getElementById('payment-method').value };
            fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(orderData) }).then(res => res.text()).then(id => { alert("Order Confirmed! ID: " + id); switchView('home-view'); });
        }
    </script>
</body>
</html>
