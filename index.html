<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blinkup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none !important; } 
        
        /* Smooth Fade Animation Upgrade */
        .view-section { 
            padding-bottom: 90px; 
            animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .nav-btn { transition: all 0.2s ease-in-out; } 
        .nav-btn:active { transform: scale(0.90); }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

    <!-- Header (Upgraded with Clickable Logo to go Home) -->
    <header class="bg-white text-purple-900 p-4 shadow-sm border-b border-gray-100 sticky top-0 z-20 flex justify-between items-center">
        <!-- Added onclick function and cursor-pointer here -->
        <div class="flex items-center gap-2 cursor-pointer transition-transform active:scale-95" onclick="switchView('home-view')">

                <path d="M28 32 L44 42 L24 58 L32 46 Z" fill="#7e22ce" stroke="#4c1d95" stroke-width="2" stroke-linejoin="round"/>

                <path d="M52 38 L56 46" stroke="#4c1d95" stroke-width="2"/>
                <rect x="46" y="46" width="12" height="12" fill="#c084fc" stroke="#4c1d95" stroke-width="2" stroke-linejoin="round"/>
                <path d="M52 46 L52 58" stroke="#4c1d95" stroke-width="2"/>
                <path d="M46 52 L58 52" stroke="#4c1d95" stroke-width="2"/>
            </svg>
            <h1 class="text-2xl font-extrabold tracking-tight text-purple-900">Blinkup</h1>
        </div>
        <button onclick="switchView('cart-view')" class="relative p-1 text-purple-900 transition-transform active:scale-90">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
            <span id="cart-count" class="absolute -top-1 -right-1 bg-purple-600 text-white text-xs font-black rounded-full w-5 h-5 flex items-center justify-center shadow-md">0</span>
        </button>
    </header>

    <div id="loading" class="text-center mt-12 text-purple-600 font-bold animate-pulse flex flex-col items-center">
        <svg class="w-10 h-10 mb-2 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
        Loading amazing food...
    </div>

    <!-- Home View -->
    <main id="home-view" class="view-section p-4 max-w-md mx-auto hidden">
        <h2 class="text-lg font-bold mb-4 text-gray-600 flex items-center gap-2">
            <svg class="w-5 h-5 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            Explore Restaurants

    <!-- Menu View -->
    <main id="menu-view" class="view-section p-4 max-w-md mx-auto hidden">
        <button onclick="switchView('home-view')" class="mb-4 text-sm text-purple-600 font-bold flex items-center gap-1 bg-purple-50 px-3 py-1.5 rounded-full w-max border border-purple-100 hover:bg-purple-100 transition-colors">

    <!-- Track View -->
    <main id="track-view" class="view-section p-4 max-w-md mx-auto hidden">

    <!-- Cart View -->

            <div class="flex justify-between text-gray-600"><span>Item Total</span><span id="bill-item-total" class="font-medium">₹0</span></div>

            <div class="bg-purple-50 p-3 rounded-xl border border-purple-100 mt-2 mb-2">

                </div>
                <button onclick="calculateDelivery()" id="btn-calc-loc" class="w-full bg-white text-purple-700 border-2 border-purple-300 font-bold py-2 rounded-lg text-sm shadow-sm hover:bg-purple-100 transition-colors active:scale-95">
                    Tap to Calculate Delivery Fee

            </div>

            <div id="bill-discount-row" class="flex justify-between text-green-600 font-bold hidden">
                <span>Coupon Discount</span><span id="bill-discount">-₹0</span>
            </div>
            <div class="flex justify-between font-black text-xl border-t pt-3 mt-2 text-gray-800"><span>To Pay</span><span id="bill-grand-total">₹0</span></div>
            
            <div class="pt-4 border-t mt-2">
                <div class="flex gap-2">
                    <input type="text" id="coupon-code" placeholder="Enter Coupon Code" class="w-full bg-gray-50 border border-gray-200 p-3 rounded-xl outline-none text-sm uppercase placeholder-gray-400 focus:border-gray-800 transition-colors">
                    <button onclick="applyCoupon()" class="bg-gray-800 text-white font-bold px-5 py-3 rounded-xl text-sm hover:bg-gray-700 transition-colors active:scale-95">Apply</button>
                </div>
                <div id="coupon-message" class="text-xs mt-2 font-bold hidden"></div>
            </div>
        </div>
        
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 space-y-4">
            <input type="text" id="cust-name" placeholder="Full Name" class="w-full bg-gray-50 border border-gray-200 p-3 rounded-xl outline-none focus:border-purple-500 transition-colors">
            <input type="tel" id="cust-phone" placeholder="Phone Number" class="w-full bg-gray-50 border border-gray-200 p-3 rounded-xl outline-none focus:border-purple-500 transition-colors">
            <input type="text" id="cust-address" placeholder="Complete Delivery Address" class="w-full bg-gray-50 border border-gray-200 p-3 rounded-xl outline-none focus:border-purple-500 transition-colors">
            <select id="payment-method" class="w-full bg-gray-50 border border-gray-200 p-3 rounded-xl outline-none focus:border-purple-500 transition-colors font-medium">
                <option value="UPI">Pay via UPI</option>
                <option value="COD">Cash on Delivery</option>
            </select>
            <button onclick="placeOrder()" id="btn-place-order" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-4 rounded-xl text-lg shadow-lg transition-all active:scale-95">Place Order</button>
        </div>
    </main>

    <div id="floating-cart" class="fixed bottom-[80px] left-0 right-0 max-w-md mx-auto px-4 hidden z-10 transition-transform active:scale-95">

    <!-- BOTTOM NAVIGATION (Icons Restored!) -->

            <span class="text-[10px] font-bold">Home</span>
        </button>
        <button id="nav-track-view" onclick="switchView('track-view')" class="nav-btn flex flex-col items-center justify-center text-gray-400 p-1">
            <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path></svg>

            <span class="text-[10px] font-bold">Support</span>

    <script>
        // --- PUT YOUR NEW WEB APP URL HERE ---
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyIGyijNWpo1qSzPLHf5BLmekqR1pEUMFNLP5m41-5K04n0EkdAM5dzuF5BiLFFQwg7gQ/exec'; 
        
        const BASE_LAT = 26.5816;
        const BASE_LON = 86.1297;

        let db = { restaurants: [], menu: [] };
        let cart = {};
        let finalTotals = { itemTotal: 0, gst: 0, delivery: null, discount: 0, grandTotal: 0, distance: null, couponApplied: "" };
        let currentRestId = null;
        let customerLat = null; 
        let customerLon = null; 

        function initApp() {
            // Load saved user details if they exist!
            if(localStorage.getItem('blinkup_name')) document.getElementById('cust-name').value = localStorage.getItem('blinkup_name');
            if(localStorage.getItem('blinkup_phone')) document.getElementById('cust-phone').value = localStorage.getItem('blinkup_phone');
            if(localStorage.getItem('blinkup_address')) document.getElementById('cust-address').value = localStorage.getItem('blinkup_address');

            let cachedData = localStorage.getItem('blinkup_cache');
            if (cachedData) {
                db = JSON.parse(cachedData);
                document.getElementById('loading').classList.add('hidden');
                renderRestaurants();
                switchView('home-view');
            }
            fetch(SCRIPT_URL + "?action=getData").then(res => res.json()).then(data => {
                db = data; 
                localStorage.setItem('blinkup_cache', JSON.stringify(db)); 
                if (!cachedData) {
                    document.getElementById('loading').classList.add('hidden'); 
                    renderRestaurants(); 
                    switchView('home-view');
                } else if (!document.getElementById('home-view').classList.contains('hidden')) {
                    renderRestaurants();
                }
            });
        }
        initApp(); 

        function switchView(viewId) {
            // Added haptic feedback for supported devices
            if (navigator.vibrate) navigator.vibrate(50);
            
            document.querySelectorAll('.view-section').forEach(el => el.classList.add('hidden'));
            
            // Re-trigger animation
            let newView = document.getElementById(viewId);
            newView.classList.remove('hidden');
            newView.style.animation = 'none';
            newView.offsetHeight; 
            newView.style.animation = null;
            
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('text-purple-600');
                btn.classList.add('text-gray-400');
            });
            let activeIcon = document.getElementById('nav-' + viewId);
            if(activeIcon) {
                activeIcon.classList.remove('text-gray-400');
                activeIcon.classList.add('text-purple-600');
            }
            
            if(viewId === 'cart-view') {
                updateCartView();
                document.getElementById('floating-cart').classList.add('hidden');
            } else {
                updateCartCount(); 
            }
            
            if(viewId === 'menu-view') renderMenu(currentRestId); 
            window.scrollTo(0,0);
        }

        function runTrackOrder() {
            let rawPhone = document.getElementById('track-phone').value;
            let phone = rawPhone.replace(/\D/g, ''); 
            let res = document.getElementById('track-result');
            
            if(!phone) return alert("Please enter a phone number.");
            res.innerHTML = "<p class='text-center text-purple-600 font-bold'>Fetching...</p>";
            
            let fetchUrl = SCRIPT_URL + "?action=trackOrder&phone=" + phone + "&t=" + new Date().getTime();
            
            fetch(fetchUrl)
            .then(r => r.text())
            .then(status => {
                status = status.trim();
                let steps = ["Order in progress", "Shipped", "Out for Delivery", "Delivered"];
                let idx = steps.indexOf(status);
                
                if(idx === -1) { 
                    res.innerHTML = "<p class='text-center font-bold text-red-500'>Order not found.</p>"; 
                    return; 
                }
                
                let html = `<div class="flex justify-between items-center mt-4 relative">
                                <div class="absolute w-full h-1 bg-gray-200 top-2 z-[-1]"></div>`;
                steps.forEach((s, i) => {
                    let color = i <= idx ? "bg-green-500" : "bg-gray-300";
                    html += `<div class="flex flex-col items-center bg-white px-1">
                                <div class="w-5 h-5 rounded-full ${color} text-white flex items-center justify-center text-[10px]">✔</div>
                                <span class="text-[9px] mt-1 text-center w-14 font-bold text-gray-600">${s}</span>
                             </div>`;
                });
                res.innerHTML = html + `</div><p class="mt-6 text-center font-extrabold text-purple-700 text-lg">Status: ${status}</p>`;
            });
        }

        function renderRestaurants() {
            let html = "";
            db.restaurants.forEach(r => {
                html += `<div onclick="openMenu('${r.id}', '${r.name}')" class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4 cursor-pointer mb-4 hover:shadow-md transition-shadow active:scale-[0.98]">
                    <div class="w-20 h-20 bg-gray-200 rounded-xl overflow-hidden flex-shrink-0"><img src="${r.image}" loading="lazy" class="w-full h-full object-cover"></div>
                    <div><h3 class="font-extrabold text-lg text-gray-800">${r.name}</h3><p class="text-xs text-green-500 font-bold bg-green-50 inline-block px-2 py-1 rounded mt-1">Open Now</p></div>
                </div>`;
            });
            document.getElementById('restaurant-list').innerHTML = html;
        }

        function openMenu(restId, restName) {
            document.getElementById('current-restaurant-name').innerText = restName;
            currentRestId = restId;
            renderMenu(restId);
            switchView('menu-view');
        }

        function renderMenu(restId) {
            let items = db.menu.filter(m => m.restaurant_id === restId);
            let html = "";
            items.forEach(item => {
                let qty = cart[item.id] ? cart[item.id].qty : 0;
                let btnHtml = qty === 0 
                    ? `<button onclick="updateQty('${item.id}', '${item.name}', ${item.price_inr}, 1)" class="bg-purple-50 text-purple-700 border border-purple-200 text-sm font-bold px-6 py-2 rounded-xl shadow-sm hover:bg-purple-100 active:scale-90 transition-all">ADD</button>`
                    : `<div class="flex items-center bg-purple-100 text-purple-700 font-bold rounded-xl border border-purple-200">
                           <button onclick="updateQty('${item.id}', '${item.name}', ${item.price_inr}, -1)" class="px-3 py-2 text-lg leading-none active:bg-purple-200 rounded-l-xl transition-colors">-</button>
                           <span class="px-2 text-sm">${qty}</span>
                           <button onclick="updateQty('${item.id}', '${item.name}', ${item.price_inr}, 1)" class="px-3 py-2 text-lg leading-none active:bg-purple-200 rounded-r-xl transition-colors">+</button>
                       </div>`;

                html += `<div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center mb-3">
                    <div>
                        <h4 class="font-bold text-gray-800 text-base">${item.name}</h4>
                        <p class="font-extrabold text-sm text-gray-600 mt-1">₹${item.price_inr}</p>
                    </div>
                    <div>${btnHtml}</div>
                </div>`;
            });
            document.getElementById('menu-list').innerHTML = html;
        }

        function updateQty(id, name, price, change) {
            if (navigator.vibrate) navigator.vibrate(20); // Small haptic bump
            if(!cart[id]) cart[id] = { name: name, price: price, qty: 0 };
            cart[id].qty += change;
            if (cart[id].qty <= 0) delete cart[id];
            
            updateCartCount();
            renderMenu(currentRestId); 
        }

        function updateCartCount() {
            let totalQty = 0;
            let totalPrice = 0;
            for(let key in cart) {
                totalQty += cart[key].qty;
                totalPrice += (cart[key].price * cart[key].qty);
            }
            document.getElementById('cart-count').innerText = totalQty;
            let floatCart = document.getElementById('floating-cart');
            if(totalQty > 0) {
                floatCart.classList.remove('hidden');
                document.getElementById('float-qty').innerText = totalQty;
                document.getElementById('float-total').innerText = "₹" + totalPrice;
            } else {
                floatCart.classList.add('hidden');
            }
        }

        function updateCartView() {
            let html = ""; 
            finalTotals.itemTotal = 0;
            
            for(let key in cart) {
                let c = cart[key]; 
                let lineTotal = c.price * c.qty;
                finalTotals.itemTotal += lineTotal;
                html += `<div class="flex justify-between text-sm py-1">
                            <span class="text-gray-700 font-medium">${c.name} <span class="text-xs text-gray-400 ml-1">x${c.qty}</span></span>
                            <span class="font-bold text-gray-800">₹${lineTotal}</span>
                         </div>`;
            }
            
            document.getElementById('cart-items').innerHTML = html || "<p class='text-center text-gray-400 py-4'>Cart is empty.</p>";
            
            finalTotals.gst = Math.round(finalTotals.itemTotal * 0.05);
            document.getElementById('bill-item-total').innerText = "₹" + finalTotals.itemTotal;
            document.getElementById('bill-gst').innerText = "₹" + finalTotals.gst;
            
            let banner = document.getElementById('free-delivery-banner');
            if (finalTotals.itemTotal === 0) {
                banner.innerText = "Add items to unlock Free Delivery!";
                banner.className = "bg-gray-100 text-gray-600 p-3 rounded-xl text-sm font-bold mb-4 text-center transition-all";
            } else if (finalTotals.itemTotal < 300) {
                let diff = 300 - finalTotals.itemTotal;
                banner.innerText = `Add ₹${diff} more for Free Delivery!`;
                banner.className = "bg-blue-50 text-blue-700 border border-blue-200 p-3 rounded-xl text-sm font-bold mb-4 text-center transition-all";
            } else {
                banner.innerText = "🎉 You've unlocked Free Delivery!";
                banner.className = "bg-green-50 text-green-700 border border-green-200 p-3 rounded-xl text-sm font-bold mb-4 text-center transition-all";
            }

            finalTotals.delivery = null;
            document.getElementById('bill-delivery').innerText = "Pending Location";
            document.getElementById('btn-calc-loc').classList.remove('hidden');
            document.getElementById('btn-calc-loc').innerText = "Tap to Calculate Delivery Fee";

            reapplyCoupon();
            updateGrandTotal();
        }

        function applyCoupon() {
            let code = document.getElementById('coupon-code').value.trim().toUpperCase();
            let msg = document.getElementById('coupon-message');
            let discountRow = document.getElementById('bill-discount-row');
            
            if (finalTotals.itemTotal === 0) {
                alert("Add items to your cart first!");
                return;
            }
            if (code === "WELCOME10") {
                if (localStorage.getItem('used_WELCOME10') === 'true') {
                    msg.innerText = "This welcome code has already been used on this device.";
                    msg.className = "text-xs mt-1 font-bold text-red-600 block";
                    return;
                }
                finalTotals.discount = Math.round(finalTotals.itemTotal * 0.10);
                finalTotals.couponApplied = "WELCOME10";
                msg.innerText = "🎉 WELCOME10 applied: 10% Off structural discount!";
                msg.className = "text-xs mt-1 font-bold text-green-600 block";
                discountRow.classList.remove('hidden');
            } else if (code === "BLINK15") {
                finalTotals.discount = Math.round(finalTotals.itemTotal * 0.15);
                finalTotals.couponApplied = "BLINK15";
                msg.innerText = "🎉 BLINK15 applied: 15% Off VIP discount!";
                msg.className = "text-xs mt-1 font-bold text-green-600 block";
                discountRow.classList.remove('hidden');
            } else if (code === "") {
                finalTotals.discount = 0;
                finalTotals.couponApplied = "";
                msg.classList.add('hidden');
                discountRow.classList.add('hidden');
            } else {
                finalTotals.discount = 0;
                finalTotals.couponApplied = "";
                msg.innerText = "Invalid coupon code.";
                msg.className = "text-xs mt-1 font-bold text-red-600 block";
                discountRow.classList.add('hidden');
            }
            document.getElementById('bill-discount').innerText = "-₹" + finalTotals.discount;
            updateGrandTotal();
        }

        function reapplyCoupon() {
            if (finalTotals.couponApplied !== "") {
                let msg = document.getElementById('coupon-message');
                let discountRow = document.getElementById('bill-discount-row');
                let pct = finalTotals.couponApplied === "WELCOME10" ? 0.10 : 0.15;
                finalTotals.discount = Math.round(finalTotals.itemTotal * pct);
                document.getElementById('bill-discount').innerText = "-₹" + finalTotals.discount;
                discountRow.classList.remove('hidden');
            }
        }

        function updateGrandTotal() {
            let btn = document.getElementById('btn-place-order');
            if(finalTotals.delivery === null) { 
                document.getElementById('bill-grand-total').innerText = "Pending Loc"; 
                return; 
            }
            finalTotals.grandTotal = finalTotals.itemTotal + finalTotals.gst + finalTotals.delivery - finalTotals.discount;
            if (finalTotals.grandTotal < 0) finalTotals.grandTotal = 0;
            document.getElementById('bill-grand-total').innerText = "₹" + finalTotals.grandTotal;
        }

        function calculateDelivery() {
            if(finalTotals.itemTotal === 0) return alert("Add items to cart first!");
            
            let calcBtn = document.getElementById('btn-calc-loc');
            calcBtn.innerText = "📍 Getting Location...";
            
            navigator.geolocation.getCurrentPosition(pos => {
                customerLat = pos.coords.latitude;
                customerLon = pos.coords.longitude;

                let R = 6371;
                let dLat = (pos.coords.latitude - BASE_LAT) * Math.PI / 180;
                let dLon = (pos.coords.longitude - BASE_LON) * Math.PI / 180;
                let a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(BASE_LAT * Math.PI / 180) * Math.cos(pos.coords.latitude * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
                let distance = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                
                finalTotals.distance = distance.toFixed(2);
                let fee = 0;
                
                if (distance > 10) {
                    alert(`You are ${finalTotals.distance}km away. We do not deliver beyond 10km.`);
                    calcBtn.innerText = "⚠️ Out of Delivery Zone";
                    return;
                }

                if (finalTotals.itemTotal < 100) {
                    if(distance <= 1) fee = 20;
                    else if(distance <= 2) fee = 25;
                    else if(distance <= 3) fee = 35;
                    else if(distance <= 4) fee = 50;
                    else if(distance <= 6) fee = 70;
                    else fee = 90; 
                } 
                else {
                    if (finalTotals.itemTotal < 300) {
                        if(distance <= 1) fee = 0; 
                        else if(distance <= 3) fee = 20; 
                        else if(distance <= 6) fee = 50; 
                        else fee = 70; 
                    } else {
                        fee = 0; 
                    }
                }
                
                finalTotals.delivery = fee;
                calcBtn.classList.add('hidden'); 
                document.getElementById('bill-delivery').innerText = "₹" + fee;
                updateGrandTotal();
            }, err => {
                alert("Please allow location access so we can calculate your delivery fee.");
                calcBtn.innerText = "⚠️ Location Failed. Tap to Try Again.";
            });
        }

        function placeOrder() {
            if(finalTotals.delivery === null) {
                alert("Please tap the 'Calculate Delivery Fee' button above before placing your order!");
                return;
            }

            let custName = document.getElementById('cust-name').value;
            let custPhone = document.getElementById('cust-phone').value;
            let custAddress = document.getElementById('cust-address').value;

            // Auto-Save details for next time!
            localStorage.setItem('blinkup_name', custName);
            localStorage.setItem('blinkup_phone', custPhone);
            localStorage.setItem('blinkup_address', custAddress);

            let orderData = { 
                customer_name: custName, 
                phone: custPhone, 
                delivery_address: custAddress, 
                distance_km: finalTotals.distance, 
                cart_details: cart, 
                item_total: finalTotals.itemTotal, 
                gst_amount: finalTotals.gst, 
                delivery_fee: finalTotals.delivery, 
                discount_amount: finalTotals.discount,
                coupon_code: finalTotals.couponApplied || "NONE",
                grand_total: finalTotals.grandTotal, 
                payment_method: document.getElementById('payment-method').value,
                lat: customerLat, 
                lon: customerLon  
            };
            
            if(!orderData.customer_name || !orderData.phone || !orderData.delivery_address) {
                return alert("Please fill in all your delivery details.");
            }

            let btn = document.getElementById('btn-place-order');
            btn.innerText = "Processing...";
            btn.disabled = true;

            fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(orderData) })
            .then(res => res.text())
            .then(id => { 
                if (finalTotals.couponApplied === "WELCOME10") {
                    localStorage.setItem('used_WELCOME10', 'true');
                }
                let confirmationText = "Order Confirmed! Your Order ID is: " + id;
                if (finalTotals.itemTotal >= 400) {
                    confirmationText += "\n\n🎉 BOOM! Because your order is above ₹400, use coupon code BLINK15 on your next purchase to get 15% off!";
                }
                alert(confirmationText);
                cart = {};
                finalTotals.couponApplied = "";
                finalTotals.discount = 0;
                document.getElementById('coupon-code').value = "";
                updateCartCount();
                switchView('home-view');
                btn.innerText = "Place Order";
                btn.disabled = false;
            }).catch(err => {
                alert("Error placing order.");
                btn.innerText = "Place Order";
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
