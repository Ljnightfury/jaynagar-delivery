    <script>
        // --- PUT YOUR NEW WEB APP URL HERE ---
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbztCCG3Rw_WY2WO_nt2FgjtaY85UImlE1YZd8moBRh0d4DQA546snx2_x-Hn5E7TR5gVg/exec'; 
        
        const BASE_LAT = 26.5816;
        const BASE_LON = 86.1297;

        let db = { restaurants: [], menu: [] };
        let cart = {};
        let finalTotals = { itemTotal: 0, gst: 0, delivery: null, grandTotal: 0, distance: null };
        let currentRestId = null;
        let customerLat = null; // NEW: Stores exact GPS
        let customerLon = null; // NEW: Stores exact GPS

        fetch(SCRIPT_URL + "?action=getData").then(res => res.json()).then(data => {
            db = data; 
            document.getElementById('loading').classList.add('hidden'); 
            renderRestaurants(); 
            switchView('home-view');
        });

        function switchView(viewId) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.add('hidden'));
            document.getElementById(viewId).classList.remove('hidden');
            
            if(viewId === 'cart-view') {
                updateCartView();
                document.getElementById('floating-cart').classList.add('hidden');
            } else {
                updateCartCount(); 
            }
            
            if(viewId === 'menu-view') renderMenu(currentRestId); 
            window.scrollTo(0,0);
        }

        function runTrackOrder() {
            let rawPhone = document.getElementById('track-phone').value;
            let phone = rawPhone.replace(/\D/g, ''); 
            let res = document.getElementById('track-result');
            
            if(!phone) return alert("Please enter a phone number.");
            res.innerHTML = "<p class='text-center text-orange-500 font-bold'>Fetching...</p>";
            
            let fetchUrl = SCRIPT_URL + "?action=trackOrder&phone=" + phone + "&t=" + new Date().getTime();
            
            fetch(fetchUrl)
            .then(r => r.text())
            .then(status => {
                status = status.trim();
                let steps = ["Order in progress", "Shipped", "Out for Delivery", "Delivered"];
                let idx = steps.indexOf(status);
                
                if(idx === -1) { 
                    res.innerHTML = "<p class='text-center font-bold text-red-500'>Order not found.</p>"; 
                    return; 
                }
                
                let html = `<div class="flex justify-between items-center mt-4 relative">
                                <div class="absolute w-full h-1 bg-gray-200 top-2 z-[-1]"></div>`;
                steps.forEach((s, i) => {
                    let color = i <= idx ? "bg-green-500" : "bg-gray-300";
                    html += `<div class="flex flex-col items-center bg-white px-1">
                                <div class="w-5 h-5 rounded-full ${color} text-white flex items-center justify-center text-[10px]">✔</div>
                                <span class="text-[9px] mt-1 text-center w-14 font-bold text-gray-600">${s}</span>
                             </div>`;
                });
                res.innerHTML = html + `</div><p class="mt-6 text-center font-extrabold text-orange-600 text-lg">Status: ${status}</p>`;
            });
        }

        function renderRestaurants() {
            let html = "";
            db.restaurants.forEach(r => {
                html += `<div onclick="openMenu('${r.id}', '${r.name}')" class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex items-center gap-4 cursor-pointer mb-4">
                    <div class="w-16 h-16 bg-gray-200 rounded-lg overflow-hidden flex-shrink-0"><img src="${r.image}" class="w-full h-full object-cover"></div>
                    <div><h3 class="font-extrabold text-lg">${r.name}</h3><p class="text-xs text-green-500 font-bold">Open Now</p></div>
                </div>`;
            });
            document.getElementById('restaurant-list').innerHTML = html;
        }

        function openMenu(restId, restName) {
            document.getElementById('current-restaurant-name').innerText = restName;
            currentRestId = restId;
            renderMenu(restId);
            switchView('menu-view');
        }

        function renderMenu(restId) {
            let items = db.menu.filter(m => m.restaurant_id === restId);
            let html = "";
            items.forEach(item => {
                let qty = cart[item.id] ? cart[item.id].qty : 0;
                let btnHtml = qty === 0 
                    ? `<button onclick="updateQty('${item.id}', '${item.name}', ${item.price_inr}, 1)" class="bg-orange-50 text-orange-600 border border-orange-200 text-sm font-bold px-6 py-1.5 rounded-lg shadow-sm">ADD</button>`
                    : `<div class="flex items-center bg-orange-100 text-orange-600 font-bold rounded-lg border border-orange-200">
                           <button onclick="updateQty('${item.id}', '${item.name}', ${item.price_inr}, -1)" class="px-3 py-1.5 text-lg leading-none">-</button>
                           <span class="px-2 text-sm">${qty}</span>
                           <button onclick="updateQty('${item.id}', '${item.name}', ${item.price_inr}, 1)" class="px-3 py-1.5 text-lg leading-none">+</button>
                       </div>`;

                html += `<div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex justify-between items-center mb-3">
                    <div>
                        <h4 class="font-bold text-gray-800">${item.name}</h4>
                        <p class="font-extrabold text-sm text-gray-600">₹${item.price_inr}</p>
                    </div>
                    <div>${btnHtml}</div>
                </div>`;
            });
            document.getElementById('menu-list').innerHTML = html;
        }

        function updateQty(id, name, price, change) {
            if(!cart[id]) cart[id] = { name: name, price: price, qty: 0 };
            cart[id].qty += change;
            if (cart[id].qty <= 0) delete cart[id];
            
            updateCartCount();
            renderMenu(currentRestId); 
        }

        function updateCartCount() {
            let totalQty = 0;
            let totalPrice = 0;
            
            for(let key in cart) {
                totalQty += cart[key].qty;
                totalPrice += (cart[key].price * cart[key].qty);
            }
            
            document.getElementById('cart-count').innerText = totalQty;

            let floatCart = document.getElementById('floating-cart');
            if(totalQty > 0) {
                floatCart.classList.remove('hidden');
                document.getElementById('float-qty').innerText = totalQty;
                document.getElementById('float-total').innerText = "₹" + totalPrice;
            } else {
                floatCart.classList.add('hidden');
            }
        }

        function updateCartView() {
            let html = ""; 
            finalTotals.itemTotal = 0;
            
            for(let key in cart) {
                let c = cart[key]; 
                let lineTotal = c.price * c.qty;
                finalTotals.itemTotal += lineTotal;
                html += `<div class="flex justify-between text-sm">
                            <span>${c.name} <span class="text-xs text-gray-400">x${c.qty}</span></span>
                            <span class="font-bold">₹${lineTotal}</span>
                         </div>`;
            }
            
            document.getElementById('cart-items').innerHTML = html || "<p class='text-center text-gray-400'>Cart is empty.</p>";
            
            finalTotals.gst = Math.round(finalTotals.itemTotal * 0.05);
            document.getElementById('bill-item-total').innerText = "₹" + finalTotals.itemTotal;
            document.getElementById('bill-gst').innerText = "₹" + finalTotals.gst;
            
            let banner = document.getElementById('free-delivery-banner');
            if (finalTotals.itemTotal === 0) {
                banner.innerText = "Add items to unlock Free Delivery!";
                banner.className = "bg-gray-100 text-gray-600 p-3 rounded-lg text-sm font-bold mb-4 text-center";
            } else if (finalTotals.itemTotal < 300) {
                let diff = 300 - finalTotals.itemTotal;
                banner.innerText = `Add ₹${diff} more for Free Delivery!`;
                banner.className = "bg-blue-50 text-blue-700 border border-blue-200 p-3 rounded-lg text-sm font-bold mb-4 text-center";
            } else {
                banner.innerText = "🎉 You've unlocked Free Delivery!";
                banner.className = "bg-green-50 text-green-700 border border-green-200 p-3 rounded-lg text-sm font-bold mb-4 text-center";
            }

            finalTotals.delivery = null;
            document.getElementById('bill-delivery').innerText = "Calc Loc \u2192";
            updateGrandTotal();
        }

        function updateGrandTotal() {
            let btn = document.getElementById('btn-place-order');
            if(finalTotals.delivery === null) { 
                document.getElementById('bill-grand-total').innerText = "Pending Loc"; 
                btn.disabled = true;
                return; 
            }
            finalTotals.grandTotal = finalTotals.itemTotal + finalTotals.gst + finalTotals.delivery;
            document.getElementById('bill-grand-total').innerText = "₹" + finalTotals.grandTotal;
            btn.disabled = false;
        }

        function calculateDelivery() {
            if(finalTotals.itemTotal === 0) return alert("Add items to cart first!");
            document.getElementById('bill-delivery').innerText = "Getting Loc...";
            
            navigator.geolocation.getCurrentPosition(pos => {
                // NEW: Saving exact coordinates
                customerLat = pos.coords.latitude;
                customerLon = pos.coords.longitude;

                let R = 6371;
                let dLat = (pos.coords.latitude - BASE_LAT) * Math.PI / 180;
                let dLon = (pos.coords.longitude - BASE_LON) * Math.PI / 180;
                let a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(BASE_LAT * Math.PI / 180) * Math.cos(pos.coords.latitude * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
                let distance = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                
                finalTotals.distance = distance.toFixed(2);
                let fee = 0;
                
                if(finalTotals.itemTotal < 300) {
                    if(distance <= 1) fee = 0; 
                    else if(distance <= 3) fee = 20; 
                    else if(distance <= 6) fee = 50; 
                    else if(distance <= 10) fee = 70; 
                    else { alert(`You are ${finalTotals.distance}km away. We do not deliver beyond 10km.`); document.getElementById('bill-delivery').innerText = "Out of Zone"; return; }
                }
                
                finalTotals.delivery = fee;
                document.getElementById('bill-delivery').innerText = "₹" + fee;
                updateGrandTotal();
            }, err => {
                alert("Location access needed for delivery calculation.");
                document.getElementById('bill-delivery').innerText = "Loc Failed";
            });
        }

        function placeOrder() {
            let orderData = { 
                customer_name: document.getElementById('cust-name').value, 
                phone: document.getElementById('cust-phone').value, 
                delivery_address: document.getElementById('cust-address').value, 
                distance_km: finalTotals.distance, 
                cart_details: cart, 
                item_total: finalTotals.itemTotal, 
                gst_amount: finalTotals.gst, 
                delivery_fee: finalTotals.delivery, 
                grand_total: finalTotals.grandTotal, 
                payment_method: document.getElementById('payment-method').value,
                lat: customerLat, // NEW: Sending to database
                lon: customerLon  // NEW: Sending to database
            };
            
            if(!orderData.customer_name || !orderData.phone || !orderData.delivery_address) return alert("Please fill in all delivery details.");

            let btn = document.getElementById('btn-place-order');
            btn.innerText = "Processing...";
            btn.disabled = true;

            fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(orderData) })
            .then(res => res.text())
            .then(id => { 
                alert("Order Confirmed! Your Order ID is: " + id);
                cart = {};
                updateCartCount();
                document.getElementById('cust-name').value = "";
                document.getElementById('cust-address').value = "";
                switchView('home-view');
                btn.innerText = "Place Order";
            }).catch(err => {
                alert("Error placing order.");
                btn.innerText = "Place Order";
                btn.disabled = false;
            });
        }
    </script>
