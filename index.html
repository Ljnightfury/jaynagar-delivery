<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaynagar Delivery</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: #fc8019; }
    </style>
</head>
<body>
    <h1>Jaynagar Delivery</h1>
    <div id="menu">Loading Menu...</div>

    <script>
        const URL = 'https://script.google.com/macros/s/AKfycbx3sO9llJjmRif80SNPGq0zYkyRXrqb002pkYFEMtBnFj4vGaqN710W0EREXxwmK5o/exec';
        
        fetch(URL + "?action=getMenu")
            .then(r => r.json())
            .then(data => {
                let html = "";
                data.forEach(item => {
                    html += `<div class="card">
                        <strong>${item.name}</strong><br>
                        Restaurant: ${item.restaurant}<br>
                        Price: ₹${item.price}
                    </div>`;
                });
                document.getElementById('menu').innerHTML = html;
            })
            .catch(e => {
                document.getElementById('menu').innerHTML = "Error loading. Check Google Sheet tab names.";
            });
    </script>
</body>
</html>
